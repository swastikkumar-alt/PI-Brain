openapi: 3.0.3
info:
  title: Personal Intelligence Engine (PIE) Sync API
  description: |
    Production API contracts for PIE device synchronization.
    Supports zero-knowledge E2EE key wrapping and CRDT replication.
  version: 1.0.0
servers:
  - url: http://localhost:8000/api/v1
    description: Local Dev API Server
paths:
  /auth/device/register:
    post:
      tags:
        - Security & Devices
      summary: Register Device Key
      description: Registers a new device node under the user's account, publishing its public ECDH key.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_name, public_ecdh_key]
              properties:
                device_name: { type: string, example: "Alex iPhone" }
                public_ecdh_key: { type: string, description: "secp256r1 public key in PEM format." }
      responses:
        '201':
          description: Device registered successfully

  /sync/push:
    post:
      tags:
        - Synchronization
      summary: Push Encrypted Sync Events
      description: Accepts a batch of encrypted CRDT events. Pushes them directly to the Kafka event bus for background propagation.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncPushRequest'
      responses:
        '200':
          description: Batch accepted and queued

  /sync/pull:
    get:
      tags:
        - Synchronization
      summary: Pull Sync Events
      description: Retrieves encrypted CRDT events generated by peer devices since the client's last synchronization timestamp mark.
      security:
        - BearerAuth: []
      parameters:
        - name: last_checkpoint
          in: query
          required: false
          schema:
            type: string
            description: UUID v7 bookmark representing last received event timestamp.
      responses:
        '200':
          description: Sync events list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SyncEventItem'

  /keys/peers:
    get:
      tags:
        - Security & Devices
      summary: Retrieve Peer Public Keys
      description: Returns the public ECDH keys of all other active authorized devices registered to the authenticated user.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: A list of peer public keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PeerDeviceKey'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SyncPushRequest:
      type: object
      required:
        - device_id
        - events
      properties:
        device_id:
          type: string
          format: uuid
        events:
          type: array
          items:
            $ref: '#/components/schemas/SyncEventItem'

    SyncEventItem:
      type: object
      required:
        - event_id
        - ciphertext
        - iv
        - wrapped_keys
      properties:
        event_id:
          type: string
          description: UUID v7 timestamped identifier for CRDT sorting.
        ciphertext:
          type: string
          description: Base64 encoded AES-256-GCM encrypted event payload containing the database mutation detail.
        iv:
          type: string
          description: Initialization vector used for AES symmetric cipher.
        wrapped_keys:
          type: object
          description: Map of {peer_device_id: wrapped_session_key} wrapping the AES key.
          additionalProperties:
            type: string

    PeerDeviceKey:
      type: object
      properties:
        device_id:
          type: string
          format: uuid
        device_name:
          type: string
        public_ecdh_key:
          type: string
